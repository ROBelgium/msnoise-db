name: Publish to PyPI

# Trigger on a published GitHub Release (which creates a git tag).
# The same workflow publishes to TestPyPI first, then to PyPI — gated by
# the environment protection rules you configure in repo Settings.
#
# Prerequisites (do this once in the GitHub repo settings):
#   1. PyPI  → Publishing → Add a pending publisher
#        Repository : ROBelgium/msnoise-db
#        Workflow   : publish.yml
#        Environment: pypi
#   2. TestPyPI → same, environment: testpypi
#   3. In repo Settings → Environments, create "testpypi" and "pypi".
#      Add a required reviewer to "pypi" if you want a manual approval gate.
#
# No API tokens or secrets are required — OIDC trusted publishing handles auth.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # ── 1. Build sdist + wheel ────────────────────────────────────────────────
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so git describe works for _version.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist contents
        run: |
          pip install twine
          twine check dist/*
          ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ── 2. Publish to TestPyPI ────────────────────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/msnoise-db

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

  # ── 3. Publish to PyPI ────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/msnoise-db

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true